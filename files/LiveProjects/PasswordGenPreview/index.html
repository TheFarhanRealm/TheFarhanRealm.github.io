<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Generator Desktop App</title>
  <style>
    :root {
      --bg1: #3b0066;
      --bg2: #460a70;
      --bg3: #341353;
      /* Purple gradient wooo */
      --accent: #ff6f61;
      --accent-hover: #ff3b2e;
      --success: #4ade80;
      --danger: #f87171;
      --warn: #facc15;
      --card-bg: rgba(255, 255, 255, 0.07);
      --text-main: #f0f4f8;
      --text-muted: #cbd5e1;
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, Segoe UI, Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      color: #e6eef8;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      animation: fadeIn 0.6s ease
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px
    }

    p.lead {
      margin: 0 0 20px;
      color: #cbd5e1;
      font-size: 14px
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 240px;
      gap: 20px;
      margin-bottom: 18px
    }

    @media(max-width:720px) {
      .controls {
        grid-template-columns: 1fr
      }

      .card {
        padding: 20px
      }
    }

    label {
      font-size: 13px;
      color: #cbd5e1
    }

    .output {
      display: flex;
      gap: 10px;
      align-items: center
    }

    .password-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.08);
      padding: 12px 14px;
      border-radius: 10px;
      font-family: ui-monospace, monospace;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.3s
    }

    .btn {
      background: var(--accent);
      border: none;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, background 0.3s
    }

    .btn:hover {
      background: var(--accent-hover);
      transform: scale(1.05)
    }

    .btn.secondary {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15)
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px
    }

    .option {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 10px;
      border-radius: 8px;
      transition: background 0.3s
    }

    .option:hover {
      background: rgba(255, 255, 255, 0.1)
    }

    input[type=checkbox] {
      width: 16px;
      height: 16px
    }

    .slider {
      width: 100%;
      -webkit-appearance: none;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      outline: none
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(6, 182, 212, 0.6);
      transition: transform 0.2s
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.2)
    }

    .copied {
      background: var(--success);
      color: #023;
      padding: 6px 10px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 12px;
      animation: pop 0.4s ease
    }

    @keyframes pop {
      0% {
        transform: scale(0.8);
        opacity: 0
      }

      50% {
        transform: scale(1.1);
        opacity: 1
      }

      100% {
        transform: scale(1);
      }
    }

    .strength {
      margin-top: 10px;
      font-size: 13px
    }

    .strength span {
      font-weight: 600;
      transition: color 0.3s
    }

    .strength.weak span {
      color: var(--danger)
    }

    .strength.moderate span {
      color: var(--warn)
    }

    .strength.strong span {
      color: var(--success)
    }

    footer {
      margin-top: 20px;
      color: #94a3b8;
      font-size: 13px;
      text-align: center
    }

    a.mention {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600
    }
  </style>
</head>

<body>
  <main class="card" role="main">
    <h1>Password Generator</h1>
    <p class="lead">Generate strong random passwords and copy them instantly. Store them safely by using a password manager
      like <strong>Bitwarden</strong>.</p>

    <div class="controls">
      <div>
        <label for="length">Length: <span id="lengthValue">16</span></label>
        <input id="length" class="slider" type="range" min="8" max="64" value="16" />
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
          <label class="option"><input type="checkbox" id="lowercase" checked /> Lowercase</label>
          <label class="option"><input type="checkbox" id="uppercase" checked /> Uppercase</label>
          <label class="option"><input type="checkbox" id="numbers" checked /> Numbers</label>
          <label class="option"><input type="checkbox" id="symbols" checked /> Symbols</label>
        </div>
        <div style="margin-top:14px">
          <button id="generate" class="btn">Generate</button>
          <button id="clear" class="btn secondary" style="margin-left:6px">Clear</button>
        </div>
      </div>

      <div>
        <label>Generated password</label>
        <div class="output" style="margin-top:4px">
          <div id="password" class="password-box" aria-live="polite">&nbsp;</div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
            <button id="copyBtn" class="btn copy-btn">Copy</button>
            <div id="copiedBadge" style="display:none" class="copied">Copied!</div>
          </div>
        </div>
        <div id="strengthContainer" class="strength"><span id="strength">-</span></div>
      </div>
    </div>

    <footer>This runs offline on your computer so you get 100 percent privacy! :D </footer>
  </main>

  <script>
    const lengthInput = document.getElementById('length');
    const lengthValue = document.getElementById('lengthValue');
    const passwordEl = document.getElementById('password');
    const generateBtn = document.getElementById('generate');
    const copyBtn = document.getElementById('copyBtn');
    const copiedBadge = document.getElementById('copiedBadge');
    const clearBtn = document.getElementById('clear');
    const chkLower = document.getElementById('lowercase');
    const chkUpper = document.getElementById('uppercase');
    const chkNumbers = document.getElementById('numbers');
    const chkSymbols = document.getElementById('symbols');
    const strengthEl = document.getElementById('strength');
    const strengthContainer = document.getElementById('strengthContainer');

    function getCharset() {
      let sets = [];
      if (chkLower.checked) sets.push('abcdefghijklmnopqrstuvwxyz');
      if (chkUpper.checked) sets.push('ABCDEFGHIJKLMNOPQRSTUVWXYZ');
      if (chkNumbers.checked) sets.push('0123456789');
      if (chkSymbols.checked) sets.push('!@#$%^&*()_+[]{}<>?~');
      return sets.join('');
    }

    function generatePassword(len) {
      const charset = getCharset();
      if (!charset) return '';
      const array = new Uint32Array(len);
      window.crypto.getRandomValues(array);
      return Array.from(array).map(x => charset[x % charset.length]).join('');
    }

    function estimateStrength(pw) {
      if (!pw) return { label: '-', class: '' };
      let score = 0;
      if (/[a-z]/.test(pw)) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      if (pw.length >= 12) score++;
      if (pw.length >= 20) score++;
      if (score <= 2) return { label: 'Weak', class: 'weak' };
      if (score <= 4) return { label: 'Moderate', class: 'moderate' };
      return { label: 'Strong', class: 'strong' };
    }

    lengthInput.addEventListener('input', () => {
      lengthValue.textContent = lengthInput.value;
    });

    generateBtn.addEventListener('click', () => {
      const pw = generatePassword(parseInt(lengthInput.value, 10));
      passwordEl.textContent = pw || 'Enable at least one option';
      const { label, class: cls } = estimateStrength(pw);
      strengthEl.textContent = label;
      strengthContainer.className = 'strength ' + cls;
      copiedBadge.style.display = 'none';
    });

    async function copyPassword(text) {
      if (!text) return;
      if (window.electronAPI) {
        window.electronAPI.copyText(text);
      } else {
        await navigator.clipboard.writeText(text);
      }
    }

    copyBtn.addEventListener('click', () => {
      const text = passwordEl.textContent.trim();
      copyPassword(text);
      copiedBadge.style.display = 'inline-block';
      setTimeout(() => copiedBadge.style.display = 'none', 1800);
    });

    clearBtn.addEventListener('click', () => {
      passwordEl.textContent = '';
      strengthEl.textContent = '-';
      strengthContainer.className = 'strength';
      copiedBadge.style.display = 'none';
    });
  </script>
</body>

</html>
